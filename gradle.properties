# Gradle
org.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options\="-Xmx8g"
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.parallel=true
org.gradle.workers.max=6

# kmp-tor native library handlin# Note: kmp-tor native libraries may occasionally cause packaging issues with Gradle daemon
# If you encounter "Failed to read zip file" or similar packaging errors, use:
#   ./gradlew assembleDebug --no-daemon
# The androidNode build.gradle.kts already includes: jniLibs.useLegacyPackaging = true

# Kotlin
kotlin.code.style=official
## this should be change to static when we stop actively changing ths depedencies
kotlin.native.incrementalCompilation=true
kotlin.native.memory.maxHeapSize=8g

# Android
android.useAndroidX=true
android.nonTransitiveRClass=true
android.suppressUnsupportedCompileSdk=35
android.enableR8.fullMode=true
#android.enableR8.retrace=true
#android.enableR8.debug=true

# Performance optimizations
# Not needed anymore after lib bumps
android.enableJetifier=false

# Versioning
shared.version=0.20.1

node.name=Bisq Easy
node.android.version=0.8.2

client.name=Bisq Connect
client.android.version=0.6.3
client.ios.version=0.6.3

# Release
## Bump up after uploading to store for each build, and same with versioning above
client.ios.version.code=46
client.android.version.code=28
node.android.version.code=44

# Networking

## Defaults for connectivity when not set by user
client.x.trustednode.port=8090
client.android.trustednode.ip=10.0.2.2
client.ios.trustednode.ip=localhost

# To make cinterop bindings available in iosMain
kotlin.mpp.enableCInteropCommonization=true
# kotlin.mpp.enableCInteropCommonization.nowarn=true

# Code Coverage
# Overall minimum reflects real (non-generated) coverage. The generated i18n resource
# bundles are excluded from Kover (see KoverExclusions in build.gradle.kts), so this bar
# no longer includes ~36k lines of generated translation tables that used to inflate it.
# Ratchet up as real domain/presentation test coverage grows.
kover.coverage.minimum=55
kover.diff.coverage.minimum=80

# Feature (client app only)
feature.muSigEnabled=false

# Opt-in analytics (issue #525). DEV-ONLY override — debug builds only.
# - false (default): debug builds will NEVER emit events even if a developer
#   accidentally toggles the user-facing settings switch ON. Protects the
#   production GlitchTip from being polluted by dev test traffic.
# - true: debug builds RESPECT the user-facing settings toggle. Set this in
#   local.properties when actively testing analytics end-to-end on a dev build.
#
# RELEASE BUILDS IGNORE THIS PROPERTY. They always honour the user's settings
# toggle (default OFF for the user too). End users get a ready-to-flip build:
# enabling the toggle in Settings starts emitting immediately, no rebuild
# required. The trade-off is that Sentry-KMP is linked into every release
# (a few hundred KB), but stays inert until the user opts in.
feature.analyticsDevEnabled=false

