mobile.trustedNodeSetup.title=Vertrauenswürdige Knotenpaarung
mobile.trustedNodeSetup.info=Um Bisq Connect zu verwenden, müssen Sie sich mit einer Bisq2-Anwendung koppeln.\n\nVerwenden Sie die Schaltfläche unten, um sich mit Bisq2 Desktop zu koppeln, oder bitten Sie Ihren vertrauenswürdigen Knoten-Administrator, einen Kopplungscode zu teilen und ihn unten einzufügen.
mobile.trustedNodeSetup.info.details=Sie können sich mit Bisq2 Desktop oder einem headless api-app Knoten verbinden. Dies kann Ihr eigener Knoten oder einer sein, der von jemandem betrieben wird, dem Sie vertrauen.\n\nVerbindungen können entweder über Ihr lokales Netzwerk oder über Tor für einen privaten und zuverlässigen Zugriff hergestellt werden.\n\nScannen Sie den Pairing-Code, der in der Bisq2 Desktop-Anwendung angezeigt wird, oder fügen Sie den Pairing-Code in das Textfeld ein.\nSobald das Pairing abgeschlossen ist, wird die Verbindung automatisch hergestellt.
