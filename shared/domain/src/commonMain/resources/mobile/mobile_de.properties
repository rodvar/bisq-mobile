mobile.pushNotifications.optIn.headline=Push-Benachrichtigungen aktivieren?
mobile.pushNotifications.optIn.body=Standardmäßig benachrichtigt Bisq Sie nur, während die App auf Ihrem Gerät läuft - keine Drittpartei beteiligt.\n\nAktivieren Sie dies, um Handelsbenachrichtigungen zu erhalten, selbst wenn die App geschlossen ist oder nach einem Neustart. Ihr vertrauenswürdiger Knoten verschlüsselt jede Nutzlast, bevor sie über den Push-Dienst von Google gesendet wird. Google kann den Inhalt nicht lesen, sieht aber, dass Sie Benachrichtigungen erhalten.\n\nSie können dies jederzeit deaktivieren.
