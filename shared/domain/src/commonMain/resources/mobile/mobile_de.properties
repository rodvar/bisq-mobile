mobile.faqs.screenTitle=Häufig gestellte Fragen
mobile.faqs.header.title=Bisq Easy
mobile.faqs.header.subtitle=Häufige Fragen beantwortet
mobile.faqs.footer.stillHaveQuestions=Haben Sie noch Fragen?
mobile.faqs.wantToKnowMore=Möchten Sie mehr erfahren?
mobile.faqs.q1.question=Was ist Bisq?
mobile.faqs.q1.answer=Bisq ist eine Open-Source, dezentrale Bitcoin-Börse. Es gibt kein Unternehmen, kein Konto und keine KYC. Transaktionen erfolgen direkt zwischen den Teilnehmern über Tor. Diese App verwendet Bisq Easy — ein reputationsbasiertes Handelsprotokoll, bei dem es kein Escrow und keine Sicherheitsleistung gibt. Stattdessen bauen Verkäufer verifizierbares Vertrauen durch gekoppelte BSQ, Kontoalter, signierte Zeugenaufzeichnungen und Proof-of-Burn auf, die alle in eine Reputationsbewertung aggregiert werden. Wenn ein Streit entsteht, steht Mediation zur Verfügung. Die Zahlung erfolgt direkt zwischen den Händlern unter Verwendung lokaler Zahlungsmethoden.
mobile.faqs.q2.question=Wie kaufe ich Bitcoin?
mobile.faqs.q2.answer.connect=Öffnen Sie die Registerkarte Angebotsbuch und durchsuchen Sie die Angebote von Verkäufern. Tippen Sie auf ein Angebot, das zu Ihrer Zahlungsmethode und Ihrem Betrag passt. Überprüfen Sie die Reputationsbewertung des Verkäufers — sie ist Ihr wichtigstes Sicherheitszeichen in Bisq Easy. Tippen Sie auf "Angebot annehmen", und folgen Sie dann den Anweisungen auf dem Bildschirm: Senden Sie die Fiat-Zahlung an das Konto des Verkäufers und bestätigen Sie, sobald sie gesendet wurde. Der Verkäufer wird den Empfang überprüfen und Bitcoin an Ihr Wallet senden. Hinweis: Sie handeln über den Bisq2-Knoten, mit dem Sie verbunden sind — stellen Sie sicher, dass Sie diesem Knotenbetreiber vertrauen.
mobile.faqs.q2.answer.node=Öffnen Sie die Registerkarte Angebotsbuch und durchsuchen Sie die Angebote von Verkäufern. Tippen Sie auf ein Angebot, das zu Ihrer Zahlungsmethode und Ihrem Betrag passt. Überprüfen Sie die Reputationsbewertung des Verkäufers — sie ist Ihr wichtigstes Sicherheitszeichen in Bisq Easy. Tippen Sie auf "Angebot annehmen" und folgen Sie dann den Schritten auf dem Bildschirm: Senden Sie die Fiat-Zahlung an das Konto des Verkäufers und bestätigen Sie, sobald sie gesendet wurde. Der Verkäufer wird den Eingang überprüfen und Bitcoin direkt an Ihr Wallet senden. Ihre App betreibt ihren eigenen Bisq2-Knoten — Sie handeln Peer-to-Peer ohne Zwischenhändler.
mobile.faqs.q3.question=Wie verkaufe ich Bitcoin?
mobile.faqs.q3.answer.connect=Gehen Sie zum Tab Angebotsbuch und tippen Sie auf "+", um ein Verkaufsangebot zu erstellen, oder durchsuchen Sie bestehende Kaufangebote und nehmen Sie eines an. Legen Sie Ihren Preis (Marktpreis oder individuell), den Betrag und die akzeptierten Zahlungsmethoden fest. Als Verkäufer benötigen Sie Reputation – Käufer verlassen sich darauf, da sie zuerst Fiat senden. Sobald ein Käufer Ihr Angebot annimmt, teilen Sie Ihre Kontodaten über den Handelschat mit. Nachdem der Käufer die Zahlung bestätigt hat, senden Sie Bitcoin an die Wallet-Adresse. Hinweis: Transaktionen werden über Ihren verbundenen Bisq2-Knoten übertragen.
mobile.faqs.q3.answer.node=Gehen Sie zum Tab "Angebotsbuch" und tippen Sie auf "+", um ein Verkaufsangebot zu erstellen, oder durchsuchen Sie vorhandene Kaufangebote und nehmen Sie eines an. Legen Sie Ihren Preis (Marktpreis oder individuell), die Betragsspanne und die akzeptierten Zahlungsmethoden fest. Als Verkäufer benötigen Sie Reputation — Käufer verlassen sich darauf, da sie zuerst Fiat senden. Sobald ein Käufer Ihr Angebot annimmt, teilen Sie Ihre Zahlungsdetails über den Handels-Chat. Nachdem der Käufer die Zahlung bestätigt hat, senden Sie Bitcoin direkt an seine Wallet. Ihr eingebetteter Knoten signiert und sendet die Transaktion — es ist keine dritte Partei beteiligt.
mobile.faqs.q4.question=Wie kann ich meine Profilreputation erhöhen?
mobile.faqs.q4.answer=Reputation in Bisq Easy wird durch mehrere überprüfbare Aktionen aufgebaut: das Alter Ihres Bisq-Profils, das Unterzeichnen Ihres Kontos durch vertrauenswürdige Peers, das Verbrennen von BSQ oder das Koppeln von BSQ. Jede Quelle trägt zu einer aggregierten Reputationsbewertung bei, die als 5-Sterne-Bewertung angezeigt wird. Eine höhere Bewertung macht Ihre Verkaufsangebote attraktiver, da Käufer auf die Reputation als ihr primäres Sicherheitszeichen vertrauen. Tippen Sie auf "Reputation" im Mehr-Tab, um Ihre aktuelle Bewertung zu sehen und zu erfahren, welche Aktionen das größte Gewicht haben.
mobile.faqs.q5.question=Hält Bisq mein Bitcoin oder persönliche Daten?
mobile.faqs.q5.answer=Nein. Bisq Easy ist nicht verwahrend — Bitcoin wird direkt vom Wallet des Verkäufers in das Wallet des Käufers übertragen. Es gibt keine Benutzerkonten, keine E-Mail-Adresse, keine Identitätsverifizierung jeglicher Art. Ihr pseudonymes Profil existiert nur im Bisq-P2P-Netzwerk. Alle Verbindungen werden über Tor geleitet, um Ihre IP-Adresse zu schützen.
mobile.faqs.q6.question=Welche Gebühren erhebt Bisq Easy?
mobile.faqs.q6.answer=Bisq Easy erhebt keine Plattform- oder Handelsgebühren für beide Seiten. Der Verkäufer zahlt die Bitcoin-Netzwerk-Mininggebühr, wenn er Bitcoin an den Käufer sendet — Käufer zahlen keine Mininggebühr. Als Ausgleich für die null Plattformgebühr ist Bisq Easy für kleinere Handelsbeträge basierend auf dem Ruf des Verkäufers konzipiert. Desktop Bisq 2 unterstützt zusätzliche Protokolle — einschließlich MuSig mit 2-von-2-Multisig-Escrow — für größere Handelsbeträge; diese sind in der mobilen App noch nicht verfügbar.


################################################################################
# Reputation
################################################################################
mobile.reputation.info=Das Sicherheitsmodell von Bisq Easy basiert auf der Reputation des Verkäufers. Dies liegt daran, dass der Käufer während eines Handels zuerst den Betrag in Fiat sendet, weshalb der Verkäufer Reputation bereitstellen muss, um ein gewisses Maß an Sicherheit zu gewährleisten.\n\nEin Verkäufer kann Angebote bis zu dem Betrag machen und annehmen, der aus seiner Reputationsbewertung abgeleitet wird.\nDiese wird wie folgt berechnet:
mobile.reputation.buildReputation.intro.part1.formula.output=Max. Handelsbetrag *
mobile.reputation.buildReputation.intro.part1.formula.input=Reputationsbewertung
mobile.reputation.buildReputation.intro.part1.formula.footnote=* Handelsbetrag in USD umgerechnet in die verwendete Währung.
