mobile.terms.point1=उपयोगकर्ता स्थानीय कानूनों के अनुपालन में सॉफ़्टवेयर का उपयोग करने के लिए जिम्मेदार है। यदि आपके क्षेत्राधिकार में इसका उपयोग करना कानूनी नहीं है, तो सॉफ़्टवेयर का उपयोग न करें।
mobile.terms.point2=किसी भी बाजार कीमतें, नेटवर्क शुल्क अनुमान, या अन्य डेटा जो Bisq DAO द्वारा संचालित सर्वरों से प्राप्त किया गया है, 'जैसा है, जैसा उपलब्ध है' के आधार पर प्रदान किया गया है, बिना किसी प्रकार के प्रतिनिधित्व या वारंटी के। यह आपकी जिम्मेदारी है कि आप किसी भी डेटा की सत्यता या चूक के संबंध में सत्यापन करें।
mobile.terms.point3=किसी भी Fiat भुगतान विधि में बैंक चार्जबैक का संभावित जोखिम होता है। "उपयोगकर्ता समझौते" को स्वीकार करके, उपयोगकर्ता इन जोखिमों के प्रति जागरूक होने की पुष्टि करता है और किसी भी स्थिति में सॉफ़्टवेयर के लेखकों या कॉपीराइट धारकों के प्रति कानूनी जिम्मेदारी का दावा नहीं करेगा।
mobile.terms.point4=किसी भी विवाद, विवादास्पद मुद्दा या दावा जो सॉफ़्टवेयर के उपयोग से उत्पन्न होता है या उससे संबंधित है, उसे वर्तमान में लागू Bisq मध्यस्थता नियमों के अनुसार मध्यस्थता द्वारा हल किया जाएगा। मध्यस्थता ऑनलाइन की जाती है। मध्यस्थता की कार्यवाही में उपयोग की जाने वाली भाषा अंग्रेजी होगी, जब तक कि अन्यथा न कहा गया हो।
mobile.terms.point5=किसी भी स्थिति में, जब तक कि जानबूझकर और गंभीर लापरवाही के कार्यों से होने वाले नुकसान, व्यक्तिगत चोट के परिणामस्वरूप होने वाले नुकसान, या अन्य मामलों से होने वाले नुकसान जिनमें देयता लागू कानून द्वारा आवश्यक है या लिखित रूप में सहमति दी गई है, किसी भी डेवलपर, कॉपीराइट धारक और/या किसी अन्य पक्ष जो उपरोक्त अनुमति के अनुसार सॉफ़्टवेयर को संशोधित और/या संप्रेषित करता है या इसके संचालन को सुविधाजनक बनाता है, नुकसान के लिए उत्तरदायी नहीं होगा, जिसमें सॉफ़्टवेयर के उपयोग या उपयोग में असमर्थता से उत्पन्न होने वाले किसी भी सामान्य, विशेष, आकस्मिक या परिणामी नुकसान शामिल हैं (जिसमें डेटा का हानि या डेटा का गलत होना या आपके या तीसरे पक्षों द्वारा उठाए गए नुकसान या सॉफ़्टवेयर का किसी अन्य सॉफ़्टवेयर के साथ संचालन में विफलता शामिल है), भले ही ऐसे डेवलपर, कॉपीराइट धारक और/या अन्य पक्ष को ऐसे नुकसान की संभावना के बारे में सूचित किया गया हो।
mobile.terms.point6=उपयोगकर्ता पुष्टि करता है कि उसने विवाद प्रक्रिया से संबंधित नियमों को पढ़ा और सहमति दी है:
mobile.rules1=भुगतान के "कारण" फ़ील्ड के लिए ट्रेड आईडी का उपयोग करें। 'Bisq' या 'Bitcoin' जैसे शब्द कभी न शामिल करें।
mobile.rules2=यदि फिएट भेजने वाले बैंक शुल्क लेते हैं, तो भेजने वाले (BTC खरीदार) को शुल्क का भुगतान करना होगा।
mobile.rules3=मध्यस्थता की स्थिति में, आपको मध्यस्थ के साथ सहयोग करना होगा और प्रत्येक संदेश का उत्तर 48 घंटों के भीतर देना होगा।
mobile.rules4=मध्यस्थ के पास व्यापार पर कोई प्रवर्तन शक्ति नहीं है। वे केवल व्यापारियों को सहयोगात्मक समाधान पर आने में मदद कर सकते हैं।
mobile.rules5=यदि धोखाधड़ी के स्पष्ट सबूत या व्यापार नियमों के गंभीर उल्लंघन की स्थिति में, मध्यस्थ गलत व्यवहार करने वाले व्यापारी पर प्रतिबंध लगा सकता है और यदि व्यापारी बिटकॉइन विक्रेता था और उसने प्रतिष्ठा स्रोत के रूप में 'खाते की आयु' या 'हस्ताक्षरित खाते की आयु साक्षी' का उपयोग किया है, तो उन्हें Bisq पर भी प्रतिबंधित कर दिया जाएगा। यदि विक्रेता ने प्रतिष्ठा स्रोत के रूप में 'बॉन्डेड BSQ' का उपयोग किया है, तो मध्यस्थ इस घटना की रिपोर्ट DAO को करेगा और उनके बॉन्डेड BSQ को जब्त करने के लिए एक प्रस्ताव बनाएगा।
