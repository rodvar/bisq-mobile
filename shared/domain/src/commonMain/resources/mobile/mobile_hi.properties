mobile.trustedNodeSetup.title=विश्वसनीय नोड पेयरिंग
mobile.trustedNodeSetup.info=Bisq कनेक्ट का उपयोग करने के लिए, आपको Bisq2 एप्लिकेशन के साथ पेयर करना होगा।\n\nBisq2 डेस्कटॉप के साथ पेयर करने के लिए नीचे दिए गए बटन का उपयोग करें या अपने विश्वसनीय नोड प्रशासक से पेयरिंग कोड साझा करने के लिए कहें और इसे नीचे पेस्ट करें।
mobile.trustedNodeSetup.info.details=आप Bisq2 डेस्कटॉप या एक हेडलेस एपीआई-ऐप नोड से कनेक्ट कर सकते हैं। यह आपका अपना नोड हो सकता है या किसी ऐसे व्यक्ति द्वारा संचालित किया गया हो जिसे आप भरोसा करते हैं।\n\nकनेक्शन आपके स्थानीय नेटवर्क पर या निजी और विश्वसनीय पहुंच के लिए टोर के माध्यम से बनाए जा सकते हैं।\n\nBisq2 डेस्कटॉप एप्लिकेशन में दिखाए गए पेयरिंग कोड को स्कैन करें, या पेयरिंग कोड को टेक्स्ट फ़ील्ड में पेस्ट करें।\nएक बार पेयरिंग पूरी हो जाने पर, कनेक्शन स्वचालित रूप से स्थापित हो जाएगा।
