mobile.reputation.burnedBsq.howToHeadline=BSQ को कैसे बर्न करें?
mobile.reputation.burnedBsq.howTo=- आवश्यकताएँ: Bisq 1 डेस्कटॉप एप्लिकेशन और कुछ BSQ।\n- अपने 'प्रोफ़ाइल आईडी' को कॉपी करें\n- Bisq 1 खोलें और 'DAO/PROOF OF BURN' पर जाएँ और कॉपी किए गए मान को 'pre-image' फ़ील्ड में पेस्ट करें।\n- BSQ की वह राशि दर्ज करें जिसे आप बर्न करना चाहते हैं।\n- बर्न BSQ लेनदेन प्रकाशित करें।\n- ब्लॉकचेन पुष्टिकरण के बाद आपकी प्रतिष्ठा आपके प्रोफ़ाइल में दिखाई देगी।
mobile.reputation.bond.howToHeadline=BSQ बॉंड कैसे सेटअप करें?
mobile.reputation.bond.howTo=- आवश्यकताएँ: Bisq 1 डेस्कटॉप एप्लिकेशन और कुछ BSQ।\n- अपना 'प्रोफ़ाइल आईडी' कॉपी करें\n- Bisq 1 खोलें और 'DAO/BONDING/BONDED REPUTATION' पर जाएं और कॉपी किया गया मान 'salt' फ़ील्ड में पेस्ट करें।\n- BSQ की वह राशि दर्ज करें जिसे आप लॉक करना चाहते हैं और लॉक समय (50 000 ब्लॉक्स)।\n- लॉकअप लेनदेन प्रकाशित करें।\n- ब्लॉकचेन पुष्टिकरण के बाद आपकी प्रतिष्ठा आपके प्रोफ़ाइल में दिखाई देने लगेगी।
