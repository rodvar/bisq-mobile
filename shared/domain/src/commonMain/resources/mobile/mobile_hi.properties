mobile.nodeDashboard.title=Bisq Easy नोड
mobile.nodeDashboard.bulletPoint1=अपने मोबाइल पर अब Bisq की पूरी शक्ति के साथ अपने व्यापार अनुभव पर नियंत्रण रखें।
mobile.nodeDashboard.bulletPoint2=आपका नोड, आपकी गोपनीयता: अपने मोबाइल से सीधे एक पूर्ण विशेषताओं वाला P2P Bisq नोड संचालित करें। गोपनीयता और सुरक्षा पर कोई समझौता नहीं - ठीक उसी तरह जैसे आप अपने डेस्कटॉप पर Bisq चला रहे हैं।
mobile.nodeDashboard.bulletPoint3=व्यापार शुरू करने के बटन पर क्लिक करें ताकि आप अन्य Bisq उपयोगकर्ताओं से उपलब्ध ऑफ़र ब्राउज़ कर सकें या अपना खुद का ऑफ़र बना सकें। आवश्यकता होने पर मध्यस्थता का अनुरोध करें।
mobile.nodeDashboard.bulletPoint4=Bisq Easy प्रोटोकॉल विक्रेता की प्रतिष्ठा का उपयोग करता है जो प्रत्येक ऑफर पर दिखाई देती है।
