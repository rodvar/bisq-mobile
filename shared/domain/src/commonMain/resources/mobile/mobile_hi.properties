mobile.faqs.q1.question=Bisq क्या है?
mobile.faqs.q1.answer=Bisq एक ओपन-सोर्स, विकेन्द्रीकृत बिटकॉइन एक्सचेंज है। यहाँ कोई कंपनी, कोई खाता, और कोई KYC नहीं है। ट्रेड सीधे पीयरों के बीच टोर के माध्यम से होते हैं। यह ऐप Bisq Easy का उपयोग करता है - एक प्रतिष्ठा-आधारित व्यापार प्रोटोकॉल जहाँ कोई एस्क्रो और कोई सुरक्षा जमा नहीं है। इसके बजाय, विक्रेता बॉन्डेड BSQ, खाते की आयु, हस्ताक्षरित साक्षी रिकॉर्ड, और प्रूफ-ऑफ-बर्न के माध्यम से सत्यापित विश्वास बनाते हैं, जो सभी को एक प्रतिष्ठा स्कोर में समेकित किया जाता है। यदि कोई विवाद उत्पन्न होता है, तो मध्यस्थता उपलब्ध है। भुगतान स्थानीय भुगतान विधियों का उपयोग करके व्यापारियों के बीच सीधे किया जाता है।
mobile.faqs.q2.question=मैं बिटकॉइन कैसे खरीदूं?
mobile.faqs.q2.answer.connect=ऑफर बुक टैब खोलें और विक्रेताओं से ऑफ़र ब्राउज़ करें। उस ऑफ़र पर टैप करें जो आपके भुगतान विधि और राशि से मेल खाता है। विक्रेता की प्रतिष्ठा स्कोर की जांच करें — यह Bisq Easy में आपका मुख्य सुरक्षा संकेत है। "ऑफर लें" पर टैप करें, फिर स्क्रीन पर दिए गए चरणों का पालन करें: विक्रेता के खाते में फिएट भुगतान भेजें और भेजने के बाद पुष्टि करें। विक्रेता प्राप्ति की पुष्टि करेगा और आपके वॉलेट में बिटकॉइन भेजेगा। ध्यान दें: आप उस Bisq2 नोड के माध्यम से व्यापार कर रहे हैं जिसे आपने जोड़ा है — सुनिश्चित करें कि आप उस नोड ऑपरेटर पर भरोसा करते हैं।
mobile.faqs.q2.answer.node=ऑफर बुक टैब खोलें और विक्रेताओं से ऑफ़र ब्राउज़ करें। उस ऑफ़र पर टैप करें जो आपके भुगतान विधि और राशि से मेल खाता है। विक्रेता की प्रतिष्ठा स्कोर की जांच करें — यह Bisq Easy में आपका मुख्य सुरक्षा संकेत है। "ऑफर लें" पर टैप करें, फिर स्क्रीन पर दिए गए चरणों का पालन करें: विक्रेता के खाते में फिएट भुगतान भेजें और भेजने के बाद पुष्टि करें। विक्रेता प्राप्ति की पुष्टि करेगा और सीधे आपके वॉलेट में बिटकॉइन भेजेगा। आपका ऐप अपना खुद का Bisq2 नोड चलाता है — आप बिना किसी मध्यस्थ के पीयर-टू-पीयर व्यापार कर रहे हैं।
mobile.faqs.q3.question=मैं बिटकॉइन कैसे बेचूं?
mobile.faqs.q3.answer.connect=ऑफर बुक टैब पर जाएं और बिक्री ऑफर बनाने के लिए "+" पर टैप करें, या मौजूदा खरीद ऑफर्स को ब्राउज़ करें और एक ऑफ़र लें। अपनी कीमत (बाजार दर या कस्टम), राशि सीमा, और स्वीकृत भुगतान विधियों को सेट करें। एक विक्रेता के रूप में आपको प्रतिष्ठा की आवश्यकता है — खरीदार इस पर निर्भर करते हैं क्योंकि वे पहले फिएट भेजते हैं। एक बार जब खरीदार आपका ऑफर स्वीकार कर लेता है, तो व्यापार चैट के माध्यम से अपने भुगतान खाते का विवरण साझा करें। जब खरीदार भुगतान की पुष्टि करता है, तो उनके वॉलेट पते पर बिटकॉइन भेजें। नोट: लेनदेन आपके जुड़े हुए Bisq2 नोड के माध्यम से प्रसारित होते हैं।
mobile.faqs.q3.answer.node=ऑफर बुक टैब पर जाएं और बिक्री ऑफर बनाने के लिए "+" पर टैप करें, या मौजूदा खरीद ऑफरों को ब्राउज़ करें और एक ऑफ़र लें। अपनी कीमत (बाजार दर या कस्टम), राशि की सीमा, और स्वीकृत भुगतान विधियों को सेट करें। एक विक्रेता के रूप में आपको प्रतिष्ठा की आवश्यकता है — खरीदार इस पर निर्भर करते हैं क्योंकि वे पहले फिएट भेजते हैं। जब एक खरीदार आपका ऑफर स्वीकार करता है, तो व्यापार चैट के माध्यम से अपने भुगतान खाते की जानकारी साझा करें। जब खरीदार भुगतान की पुष्टि करता है, तो सीधे उनके वॉलेट में बिटकॉइन भेजें। आपका एम्बेडेड नोड लेनदेन पर हस्ताक्षर करता है और इसे प्रसारित करता है — कोई तीसरा पक्ष शामिल नहीं है।
mobile.faqs.q4.question=मैं अपनी प्रोफ़ाइल प्रतिष्ठा को कैसे बढ़ा सकता हूँ?
mobile.faqs.q4.answer=बिस्क ईज़ी में प्रतिष्ठा कई सत्यापित क्रियाओं के माध्यम से बनाई जाती है: अपने बिस्क प्रोफ़ाइल की आयु बढ़ाना, अपने खाते पर विश्वसनीय साथियों द्वारा हस्ताक्षर कराना, BSQ को बर्न करना, या BSQ को बॉन्ड करना। प्रत्येक स्रोत एक समग्र प्रतिष्ठा स्कोर में योगदान करता है जो 5-स्टार रेटिंग के रूप में दिखाया जाता है। उच्च स्कोर आपके बिक्री ऑफ़र को अधिक आकर्षक बनाता है, क्योंकि खरीदार प्रतिष्ठा पर अपने प्राथमिक सुरक्षा संकेत के रूप में निर्भर करते हैं। अपने वर्तमान स्कोर को देखने और यह जानने के लिए कि कौन सी क्रियाएँ सबसे अधिक वजन रखती हैं, अधिक टैब में "प्रतिष्ठा" पर टैप करें।
mobile.faqs.q5.question=क्या Bisq मेरे बिटकॉइन या व्यक्तिगत डेटा को रखता है?
mobile.faqs.q5.answer=नहीं। Bisq Easy गैर-कस्टोडियल है — बिटकॉइन सीधे विक्रेता के वॉलेट से खरीदार के वॉलेट में जाता है। कोई उपयोगकर्ता खाते नहीं हैं, कोई ईमेल पता नहीं है, कोई पहचान सत्यापन नहीं है। आपका उपनामित प्रोफ़ाइल केवल Bisq P2P नेटवर्क पर मौजूद है। सभी कनेक्शन आपके आईपी पते की सुरक्षा के लिए टोर के माध्यम से रूट किए जाते हैं.
mobile.faqs.q6.question=Bisq Easy किस प्रकार के शुल्क लेता है?
mobile.faqs.q6.answer=Bisq Easy किसी भी पक्ष के लिए कोई प्लेटफ़ॉर्म या ट्रेडिंग शुल्क नहीं लेता है। विक्रेता खरीदार को बिटकॉइन भेजते समय बिटकॉइन नेटवर्क खनन शुल्क का भुगतान करता है — खरीदारों को कोई खनन शुल्क नहीं देना पड़ता। शून्य प्लेटफ़ॉर्म शुल्क के लिए एक व्यापारिक समझौते के रूप में, Bisq Easy विक्रेता की प्रतिष्ठा स्तर के आधार पर छोटे व्यापार राशियों के लिए डिज़ाइन किया गया है। डेस्कटॉप Bisq 2 बड़े व्यापारों के लिए अतिरिक्त प्रोटोकॉल का समर्थन करता है — जिसमें 2-of-2 मल्टीसिग एस्क्रो के साथ MuSig शामिल है; ये मोबाइल ऐप में अभी उपलब्ध नहीं हैं।


