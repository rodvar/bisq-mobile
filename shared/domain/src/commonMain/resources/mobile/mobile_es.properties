################################################################################
mobile.faqs.screenTitle=Preguntas frecuentes
mobile.faqs.header.title=Bisq Easy
mobile.faqs.header.subtitle=Preguntas comunes respondidas
mobile.faqs.footer.stillHaveQuestions=¿Aún tienes preguntas?
mobile.faqs.wantToKnowMore=¿Quieres saber más?
mobile.faqs.q1.question=¿Qué es Bisq?
mobile.faqs.q1.answer=Bisq es un intercambio de bitcoin descentralizado y de código abierto. No hay empresa, no hay cuenta y no hay KYC. Las transacciones se realizan directamente entre pares a través de Tor. Esta aplicación utiliza Bisq Easy, un protocolo de comercio basado en la reputación donde no hay custodia ni depósito de seguridad. En su lugar, los vendedores construyen confianza verificable a través de BSQ en garantías, edad de cuenta, registros de testigos firmados y prueba de quema, todo agregado en una puntuación de reputación. Si surge una disputa, hay mediación disponible. El pago se realiza directamente entre comerciantes utilizando métodos de pago locales.
mobile.faqs.q2.question=¿Cómo compro bitcoin?
mobile.faqs.q2.answer.connect=Abre la pestaña Libro de ofertas y explora las ofertas de los vendedores. Toca una oferta que coincida con tu método de pago y monto. Verifica la puntuación de reputación del vendedor: es tu principal señal de seguridad en Bisq Easy. Toca "Aceptar oferta", luego sigue los pasos en pantalla: envía el pago en fiat a la cuenta del vendedor y confirma una vez enviado. El vendedor verificará la recepción y enviará bitcoin a tu billetera. Nota: estás comerciando a través del nodo Bisq2 con el que te emparejaste; asegúrate de confiar en ese operador de nodo.
mobile.faqs.q2.answer.node=Abre la pestaña Libro de ofertas y explora las ofertas de los vendedores. Toca una oferta que coincida con tu método de pago y monto. Verifica la puntuación de reputación del vendedor: es tu principal señal de seguridad en Bisq Easy. Toca "Aceptar oferta", luego sigue los pasos en pantalla: envía el pago en fiat a la cuenta del vendedor y confirma una vez enviado. El vendedor verificará la recepción y enviará bitcoin directamente a tu billetera. Tu aplicación ejecuta su propio nodo Bisq2: estás comerciando de igual a igual sin ningún intermediario.
mobile.faqs.q3.question=¿Cómo vendo bitcoin?
mobile.faqs.q3.answer.connect=Ve a la pestaña de Libro de ofertas y toca "+" para crear una oferta de venta, o explora las ofertas de compra existentes y acepta una. Establece tu precio (tarifa de mercado o personalizada), rango de cantidad y métodos de pago aceptados. Como vendedor, necesitas reputación — los compradores confían en ella ya que envían fiat primero. Una vez que un comprador acepte tu oferta, comparte los detalles de tu cuenta de pago a través del chat de comercio. Después de que el comprador confirme el pago, envía bitcoin a su dirección de billetera. Nota: las transacciones se transmiten a través de tu nodo Bisq2 emparejado.
mobile.faqs.q3.answer.node=Ve a la pestaña de Libro de ofertas y toca "+" para crear una oferta de venta, o explora las ofertas de compra existentes y acepta una. Establece tu precio (tarifa de mercado o personalizada), rango de cantidad y métodos de pago aceptados. Como vendedor, necesitas reputación — los compradores confían en ella ya que envían fiat primero. Una vez que un comprador acepte tu oferta, comparte los detalles de tu cuenta de pago a través del chat de comercio. Después de que el comprador confirme el pago, envía bitcoin directamente a su billetera. Tu nodo embebido firma y transmite la transacción — no hay terceros involucrados.
mobile.faqs.q4.question=¿Cómo aumento la reputación de mi perfil?
mobile.faqs.q4.answer=La reputación en Bisq Easy se construye a través de varias acciones verificables: envejeciendo tu perfil de Bisq, haciendo que tu cuenta sea firmada por pares de confianza, quemando BSQ o garantizando BSQ. Cada fuente contribuye a una puntuación de reputación agregada que se muestra como una calificación de 5 estrellas. Una puntuación más alta hace que tus ofertas de venta sean más atractivas, ya que los compradores confían en la reputación como su principal señal de seguridad. Toca "Reputación" en la pestaña Más para ver tu puntuación actual y aprender qué acciones tienen más peso.
mobile.faqs.q5.question=¿Bisq retiene mi bitcoin o datos personales?
mobile.faqs.q5.answer=No. Bisq Easy es no custodial: el bitcoin se mueve directamente de la billetera del vendedor a la billetera del comprador. No hay cuentas de usuario, no hay dirección de correo electrónico, no hay verificación de identidad de ningún tipo. Tu perfil seudónimo existe solo en la red P2P de Bisq. Todas las conexiones se enrutan a través de Tor para proteger tu dirección IP.
mobile.faqs.q6.question=¿Qué tarifas cobra Bisq Easy?
mobile.faqs.q6.answer=Bisq Easy no cobra ninguna tarifa de plataforma o de comercio para ninguna de las partes. El vendedor paga la tarifa de minería de la red Bitcoin al enviar bitcoin al comprador; los compradores no pagan ninguna tarifa de minería. Como compensación por la tarifa de plataforma cero, Bisq Easy está diseñado para montos de comercio más pequeños basados en el nivel de reputación del vendedor. Bisq 2 de escritorio admite protocolos adicionales, incluyendo MuSig con escrow multisig 2-de-2, para comercios más grandes; estos aún no están disponibles en la aplicación móvil.


