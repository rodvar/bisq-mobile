mobile.trustedNodeSetup.title=Emparejamiento de nodo de confianza
mobile.trustedNodeSetup.info=Para usar Bisq Connect, debes emparejarte con una aplicación Bisq2.\n\nUtiliza el botón de abajo para emparejarte con Bisq2 Desktop o pide a tu administrador de nodo de confianza que comparta un código de emparejamiento y pégalo abajo.
mobile.trustedNodeSetup.info.details=Puedes conectarte a Bisq2 Desktop o a un nodo de aplicación API sin cabeza. Este puede ser tu propio nodo o uno operado por alguien en quien confíes.\n\nLas conexiones se pueden realizar ya sea en tu red local o a través de Tor para un acceso privado y confiable.\n\nEscanea el código de emparejamiento mostrado en la aplicación Bisq2 Desktop, o pega el código de emparejamiento en el campo de texto.\nUna vez que el emparejamiento esté completo, la conexión se establecerá automáticamente.
