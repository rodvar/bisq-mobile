mobile.pushNotifications.learnMore.android.optInNote=Bisq se comunica con Google solo después de que actives esto. Mientras el interruptor esté apagado, la biblioteca FCM está empaquetada pero inactiva — no se abre ninguna conexión con los servidores de Google. Apagar el interruptor nuevamente revoca el token y detiene todo el tráfico.
