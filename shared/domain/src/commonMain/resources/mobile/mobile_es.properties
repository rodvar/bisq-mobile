# Settings — relayed-notifications opt-in confirmation dialog
mobile.pushNotifications.optIn.headline=¿Activar notificaciones push retransmitidas?
mobile.pushNotifications.optIn.body=Por defecto, Bisq te notifica solo mientras la aplicación está en ejecución en tu dispositivo — sin terceros involucrados.\n\nHabilita esto para recibir alertas de comercio incluso cuando la aplicación está cerrada o después de un reinicio. Tu nodo de confianza encripta cada carga útil antes de enviarla a través del servicio de notificaciones push de Google. Google no puede leer el contenido, pero puede ver que recibes notificaciones.\n\nPuedes desactivar esto en cualquier momento.
