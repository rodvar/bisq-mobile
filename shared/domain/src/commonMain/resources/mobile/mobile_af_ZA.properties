mobile.trustedNodeSetup.title=Vertroude nodus paarvorming
mobile.trustedNodeSetup.info=Om Bisq Connect te gebruik, moet jy met 'n Bisq2-toepassing paar.\n\nGebruik die knoppie hieronder om met Bisq2 Desktop te paar of vra jou vertroude nodusadministrateur om 'n paar kode te deel en plak dit hieronder.
