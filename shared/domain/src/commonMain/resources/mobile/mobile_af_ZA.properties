mobile.reputation.info=Die sekuriteitsmodel van Bisq Easy berus op die verkoper se reputasie. Dit is omdat die koper tydens 'n handel eers die fiatbedrag stuur, daarom moet die verkoper reputasie verskaf om 'n sekere vlak van sekuriteit te vestig.\n\n'n Verkoper kan aanbiedinge maak en neem tot die bedrag wat afgelei word van hul reputasie-telling.\nDit word as volg bereken:
