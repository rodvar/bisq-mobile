mobile.terms.point1=O usuário é responsável por usar o software em conformidade com as leis locais. Não use o software se usá-lo não for legal em sua jurisdição.
mobile.terms.point2=Quaisquer preços de mercado, estimativas de taxas de rede ou outros dados obtidos de servidores operados pelo Bisq DAO são fornecidos em uma base 'como está, conforme disponível' sem representação ou garantia de qualquer tipo. É sua responsabilidade verificar quaisquer dados fornecidos em relação a imprecisões ou omissões.
mobile.terms.point3=Qualquer método de pagamento Fiat carrega um risco potencial de estorno bancário. Ao aceitar o "Acordo do Usuário", o usuário confirma estar ciente desses riscos e em nenhum caso reivindicará responsabilidade legal aos autores ou detentores de direitos autorais do software.
mobile.terms.point4=Qualquer disputa, controvérsia ou reivindicação decorrente ou relacionada ao uso do software será resolvida por arbitração de acordo com as regras de arbitração do Bisq em vigor no momento. A arbitração é conduzida online. O idioma a ser usado nos procedimentos de arbitração será o inglês, se não especificado de outra forma.
mobile.terms.point5=Em nenhum evento, exceto por danos causados por atos de intenção e negligência grave, danos resultantes de lesão corporal, ou danos decorrentes de outras instâncias onde a responsabilidade é exigida pela lei aplicável ou acordada por escrito, qualquer desenvolvedor, detentor de direitos autorais e/ou qualquer outra parte que modifique e/ou transmita o software conforme permitido acima ou facilite sua operação, será responsável por danos, incluindo quaisquer danos gerais, especiais, incidentais ou consequenciais decorrentes do uso ou incapacidade de usar o software (incluindo, mas não limitado à perda de dados ou dados sendo tornados imprecisos ou perdas sofridas por você ou terceiros ou uma falha do software em operar com qualquer outro software), mesmo que tal desenvolvedor, detentor de direitos autorais e/ou outra parte tenha sido avisado da possibilidade de tais danos.
mobile.terms.point6=O usuário confirma que leu e concordou com as regras sobre o processo de disputa:
mobile.rules1=Use o ID da negociação para o campo "motivo do pagamento". NUNCA inclua termos como 'Bisq' ou 'Bitcoin'
mobile.rules2=Se o banco do remetente fiat cobrar taxas, o remetente (comprador de BTC) tem que cobrir as taxas.
mobile.rules3=Em caso de mediação, você deve cooperar com o mediador e responder a cada mensagem dentro de 48 horas.
mobile.rules4=O mediador não tem poder de execução sobre a negociação. Eles só podem ajudar os negociadores a chegar a uma resolução cooperativa.
mobile.rules5=Em caso de evidência clara de golpe ou violação grave das regras de negociação, o mediador pode banir o negociador mal comportado e, caso o negociador fosse o vendedor de Bitcoin e usasse 'idade da conta' ou 'testemunha de idade da conta assinada' como fonte de reputação, eles também serão banidos no Bisq 1. Se o vendedor usou 'BSQ vinculado' como fonte de reputação, o mediador relatará o incidente ao DAO e fará uma proposta para confiscar seu BSQ vinculado.
