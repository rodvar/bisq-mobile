mobile.trustedNodeSetup.title=Configuração de nó confiável
mobile.trustedNodeSetup.info=Para usar o Bisq Connect, você deve emparelhar com um aplicativo Bisq2.\n\nUse o botão abaixo para emparelhar com o Bisq2 Desktop ou peça ao administrador do seu nó confiável para compartilhar um código de emparelhamento e cole-o abaixo.
mobile.trustedNodeSetup.info.details=Você pode se conectar ao Bisq2 Desktop ou a um nó de aplicativo API sem interface. Este pode ser seu próprio nó ou um operado por alguém em quem você confia.\n\nAs conexões podem ser feitas tanto na sua rede local quanto via Tor para acesso privado e confiável.\n\nEscaneie o código de emparelhamento mostrado no aplicativo Bisq2 Desktop ou cole o código de emparelhamento no campo de texto.\nUma vez que o emparelhamento esteja completo, a conexão será estabelecida automaticamente.
